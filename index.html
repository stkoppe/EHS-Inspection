<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── Colors ── */
const C = {
  bg: "#060608", surface: "#0E0E12", surfaceHover: "#161619",
  card: "#111114", border: "#1E1E22", borderLight: "#2A2A30",
  accent: "#FFFFFF", accentDim: "rgba(255,255,255,0.06)",
  accentGlow: "rgba(255,255,255,0.12)",
  danger: "#FF4D4D", dangerDim: "rgba(255,77,77,0.1)",
  success: "#00E676", successDim: "rgba(0,230,118,0.1)",
  info: "#90A4AE", infoDim: "rgba(144,164,174,0.1)",
  warning: "#FFB300",
  text: "#FEFFFF", textMuted: "#8A8A96", textDim: "#4A4A56",
  glow: "0 0 20px rgba(255,255,255,0.04)",
};

/* ── LocalStorage DB ── */
const DB = {
  get(key, fallback) { try { return JSON.parse(localStorage.getItem(`ehs_${key}`)) || fallback; } catch { return fallback; } },
  set(key, val) { localStorage.setItem(`ehs_${key}`, JSON.stringify(val)); },
  nextId(key) { const id = this.get(`${key}_seq`, 100) + 1; this.set(`${key}_seq`, id); return id; },
};

/* ── Power Automate Integration ── */
const FLOW_URLS = {
  get inspection() { return DB.get("flow_url_inspection", ""); },
  get corrective() { return DB.get("flow_url_corrective", ""); },
  get update() { return DB.get("flow_url_update", ""); },
};

const SyncStatus = { PENDING: "pending", SYNCED: "synced", FAILED: "failed", OFFLINE: "offline" };

async function pushToFlow(flowKey, data) {
  const url = FLOW_URLS[flowKey];
  if (!url) return { status: SyncStatus.OFFLINE, reason: "No flow URL configured" };

  try {
    // Strip base64 photos from payload — too large for Power Automate
    const cleanData = { ...data };
    if (cleanData.photos) {
      const photoCounts = {};
      Object.entries(cleanData.photos).forEach(([k, v]) => { photoCounts[k] = Array.isArray(v) ? v.length : 0; });
      cleanData.photoAttachmentCounts = photoCounts;
      delete cleanData.photos;
    }

    const resp = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(cleanData),
    });

    if (resp.ok || resp.status === 202) {
      return { status: SyncStatus.SYNCED };
    } else {
      return { status: SyncStatus.FAILED, reason: `HTTP ${resp.status}` };
    }
  } catch (err) {
    // Queue for retry — offline support
    const queue = DB.get("sync_queue", []);
    queue.push({ flowKey, data, timestamp: new Date().toISOString(), retries: 0 });
    DB.set("sync_queue", queue);
    return { status: SyncStatus.PENDING, reason: err.message };
  }
}

// Retry queued items when back online
async function processRetryQueue(showToast) {
  const queue = DB.get("sync_queue", []);
  if (queue.length === 0) return;

  const remaining = [];
  for (const item of queue) {
    const url = FLOW_URLS[item.flowKey];
    if (!url) { remaining.push(item); continue; }
    try {
      const resp = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(item.data),
      });
      if (!resp.ok && resp.status !== 202) {
        if (item.retries < 3) remaining.push({ ...item, retries: item.retries + 1 });
      }
    } catch {
      if (item.retries < 3) remaining.push({ ...item, retries: item.retries + 1 });
    }
  }
  DB.set("sync_queue", remaining);
  if (remaining.length < queue.length && showToast) {
    showToast(`Synced ${queue.length - remaining.length} queued item(s)`);
  }
}

/* ── NFC/RFID Scanner ── */
async function scanNFC() {
  if (!("NDEFReader" in window)) {
    return { success: false, error: "NFC not supported on this device/browser. Use Chrome on Android." };
  }
  try {
    const ndef = new NDEFReader();
    await ndef.scan();
    return new Promise((resolve) => {
      ndef.addEventListener("reading", ({ serialNumber }) => {
        resolve({ success: true, tagId: serialNumber });
      }, { once: true });
      setTimeout(() => resolve({ success: false, error: "No tag detected. Hold phone near the RFID tag." }), 10000);
    });
  } catch (err) {
    return { success: false, error: err.message };
  }
}

// Import harness inventory from Excel
function importHarnessInventory(file, callback) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const wb = XLSX.read(e.target.result, { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(ws);
    const current = getHarnessInventory();
    data.forEach(row => {
      const existing = current.findIndex(h => h.RFIDTagID === row.RFIDTagID);
      if (existing >= 0) { current[existing] = { ...current[existing], ...row }; }
      else { current.push(row); }
    });
    saveHarnessInventory(current);
    if (callback) callback(current.length);
  };
  reader.readAsArrayBuffer(file);
}

function useIsMobile() {
  const [m, setM] = useState(window.innerWidth <= 768);
  useEffect(() => { const h = () => setM(window.innerWidth <= 768); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, []);
  return m;
}

function useToast() {
  const [toast, setToast] = useState(null);
  const show = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast(null), 3000); };
  const el = toast ? React.createElement("div", {
    className: "toast",
    style: { background: toast.type === "success" ? C.success : toast.type === "error" ? C.danger : C.info, color: "#fff" }
  }, toast.msg) : null;
  return [el, show];
}

/* ── PDF Generation ── */
function generatePDF(inspection, responses, notes, photos) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const tpl = TEMPLATES.find(t => t.id === inspection.template);
  const margin = 20;
  let y = 20;
  const pw = doc.internal.pageSize.getWidth() - margin * 2;

  const addPage = () => { doc.addPage(); y = 20; };
  const checkPage = (need) => { if (y + need > 270) addPage(); };

  // Header
  doc.setFillColor(15, 17, 23);
  doc.rect(0, 0, 220, 40, "F");
  doc.setTextColor(245, 158, 11);
  doc.setFontSize(18);
  doc.setFont(undefined, "bold");
  doc.text("EHS INSPECTION REPORT", margin, y + 8);
  doc.setFontSize(9);
  doc.setTextColor(139, 143, 163);
  doc.text("Generated " + new Date().toLocaleString(), margin, y + 15);
  y = 48;

  // Info box
  doc.setFillColor(30, 33, 48);
  doc.roundedRect(margin, y, pw, 32, 3, 3, "F");
  doc.setFontSize(10);
  doc.setTextColor(232, 233, 237);
  doc.setFont(undefined, "bold");
  doc.text(tpl.name, margin + 6, y + 8);
  doc.setFont(undefined, "normal");
  doc.setTextColor(139, 143, 163);
  doc.setFontSize(9);
  doc.text(`Regulation: ${tpl.reg}`, margin + 6, y + 15);
  doc.text(`Location: ${inspection.location}    Inspector: ${inspection.inspector}    Date: ${inspection.date}`, margin + 6, y + 22);
  doc.text(`Weather: ${inspection.weather}`, margin + 6, y + 28);
  y += 40;

  // Summary
  const totalItems = tpl.sections.reduce((a, s) => a + s.items.length, 0);
  const findings = Object.entries(responses).filter(([, v]) => v === "no").length;
  doc.setFillColor(findings > 0 ? 40 : 20, findings > 0 ? 25 : 35, findings > 0 ? 25 : 30);
  doc.roundedRect(margin, y, pw, 14, 3, 3, "F");
  doc.setFontSize(10);
  doc.setTextColor(findings > 0 ? 239 : 34, findings > 0 ? 68 : 197, findings > 0 ? 68 : 94);
  doc.setFont(undefined, "bold");
  doc.text(`${findings} FINDING${findings !== 1 ? "S" : ""} OUT OF ${totalItems} ITEMS INSPECTED`, margin + 6, y + 9);
  y += 22;

  // Sections
  tpl.sections.forEach(section => {
    checkPage(20);
    doc.setFillColor(26, 29, 39);
    doc.roundedRect(margin, y, pw, 10, 2, 2, "F");
    doc.setFontSize(9);
    doc.setFont(undefined, "bold");
    doc.setTextColor(...hexToRgb(tpl.color));
    doc.text(section.title.toUpperCase(), margin + 4, y + 7);
    y += 14;

    section.items.forEach(item => {
      const ans = responses[item.id] || "—";
      const isNo = ans === "no";
      checkPage(isNo ? 30 : 12);

      if (isNo) {
        doc.setFillColor(40, 22, 22);
        doc.roundedRect(margin, y - 3, pw, notes[item.id] ? 22 : 12, 2, 2, "F");
      }

      doc.setFontSize(8);
      doc.setFont(undefined, "normal");
      doc.setTextColor(200, 200, 200);
      const lines = doc.splitTextToSize(item.text, pw - 30);
      doc.text(lines, margin + 4, y + 3);

      doc.setFont(undefined, "bold");
      doc.setTextColor(
        ans === "yes" ? 34 : ans === "no" ? 239 : 139,
        ans === "yes" ? 197 : ans === "no" ? 68 : 143,
        ans === "yes" ? 94 : ans === "no" ? 68 : 163,
      );
      doc.text(ans.toUpperCase(), margin + pw - 10, y + 3);

      y += lines.length * 4 + 4;

      if (isNo && notes[item.id]) {
        doc.setFont(undefined, "italic");
        doc.setTextColor(200, 160, 100);
        doc.setFontSize(7);
        const noteLines = doc.splitTextToSize("Finding: " + notes[item.id], pw - 12);
        doc.text(noteLines, margin + 8, y);
        y += noteLines.length * 3.5 + 4;
      }
      y += 2;
    });
    y += 4;
  });

  // Photos section
  const photoItems = Object.entries(photos).filter(([, arr]) => arr && arr.length > 0);
  if (photoItems.length > 0) {
    checkPage(20);
    doc.setFontSize(11);
    doc.setFont(undefined, "bold");
    doc.setTextColor(245, 158, 11);
    doc.text("PHOTO DOCUMENTATION", margin, y + 5);
    y += 12;

    photoItems.forEach(([itemId, imgs]) => {
      const allItems = tpl.sections.flatMap(s => s.items);
      const item = allItems.find(i => i.id === itemId);
      checkPage(50);
      doc.setFontSize(8);
      doc.setFont(undefined, "bold");
      doc.setTextColor(200, 200, 200);
      doc.text(item ? item.text.slice(0, 80) : itemId, margin + 4, y + 3);
      y += 6;
      imgs.forEach(img => {
        checkPage(45);
        try { doc.addImage(img, "JPEG", margin + 4, y, 40, 30); } catch {}
        y += 34;
      });
      y += 4;
    });
  }

  doc.save(`EHS-Inspection-${inspection.template}-${inspection.date}-${inspection.id}.pdf`);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}

function downloadCSV(filename, content) {
  const blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = filename;
  link.click();
  URL.revokeObjectURL(link.href);
}

// Adds a named Excel Table to a worksheet so Power Automate can find it
function addTableToSheet(ws, tableName, cols, rowCount) {
  const ref = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: rowCount, c: cols - 1 } });
  if (!ws["!tables"]) ws["!tables"] = [];
  // SheetJS doesn't natively support Tables in the free version,
  // so we'll use a different approach: export as a single-sheet workbook
  // with the sheet name matching what Power Automate expects
  ws["!autofilter"] = { ref: ref };
  ws["!ref"] = ref;
}

/* ── Inspection Form ── */
function InspectionForm({ template, onBack, onSubmit, mobile }) {
  const tpl = TEMPLATES.find(t => t.id === template);
  const [responses, setResponses] = useState({});
  const [notes, setNotes] = useState({});
  const [photos, setPhotos] = useState({});
  const selectedLocId = DB.get("selected_location", "cape");
  const selectedLoc = LOCATIONS.find(l => l.id === selectedLocId);
  const [meta, setMeta] = useState({ location: selectedLoc?.name || "Cape Canaveral", weather: "Clear", inspector: DB.get("inspector_name", ""), site: DB.get("site_name", "") });
  const [submitted, setSubmitted] = useState(false);
  const [showSettings, setShowSettings] = useState(!DB.get("inspector_name", ""));
  const [showRfidPrompt, setShowRfidPrompt] = useState(tpl.id === "fall-pro" && !DB.get("pending_rfid", ""));
  const [rfidManualId, setRfidManualId] = useState("");
  const [rfidScanning, setRfidScanning] = useState(false);

  const setResponse = (id, val) => setResponses(p => ({ ...p, [id]: val }));
  const setNote = (id, val) => setNotes(p => ({ ...p, [id]: val }));

  const totalItems = tpl.sections.reduce((a, s) => a + s.items.length, 0);
  const answered = Object.keys(responses).length;
  const progress = totalItems > 0 ? Math.round((answered / totalItems) * 100) : 0;
  const noItems = Object.entries(responses).filter(([, v]) => v === "no");

  const handleSubmit = () => {
    const pendingRfid = DB.get("pending_rfid", "");
    const inspection = {
      id: DB.nextId("inspection"),
      template: tpl.id,
      inspector: meta.inspector,
      site: meta.site,
      location: meta.location,
      date: TODAY,
      weather: meta.weather,
      totalItems,
      findings: noItems.length,
      critical: noItems.filter(([id]) => {
        const note = (notes[id] || "").toLowerCase();
        return note.includes("critical") || note.includes("immediate");
      }).length,
      status: "complete",
      responses: { ...responses },
      notes: { ...notes },
      photos: { ...photos },
      rfidTagId: pendingRfid,
      inspectionType: meta.inspectionType || "Pre-Use",
      createdAt: new Date().toISOString(),
    };

    // Update harness inventory if this is a fall protection inspection with RFID
    if (tpl.id === "fall-pro" && pendingRfid) {
      const overallResult = noItems.length > 0 ? "Fail" : "Pass";
      upsertHarness({
        RFIDTagID: pendingRfid,
        Status: overallResult === "Fail" ? "Do Not Use" : "Active",
        LastInspectionDate: TODAY,
        LastInspectionResult: overallResult,
        NextInspectionDue: new Date(Date.now() + 180 * 86400000).toISOString().slice(0, 10),
      });
      DB.set("pending_rfid", "");
    }

    // Auto-create corrective actions for "no" answers
    const newActions = noItems.map(([itemId]) => {
      const allItems = tpl.sections.flatMap(s => s.items);
      const item = allItems.find(i => i.id === itemId);
      const noteText = notes[itemId] || "";
      const priority = noteText.toLowerCase().includes("critical") || noteText.toLowerCase().includes("immediate") ? "Critical"

function CorrectiveActions({ corrective, setCorrective, mobile, showToast }) {
  const [filter, setFilter] = useState("all");
  const [editing, setEditing] = useState(null);
  const filtered = filter === "all" ? corrective : corrective.filter(c => c.status === filter);

  const updateAction = async (id, updates) => {
    const prev = corrective.find(c => c.id === id);
    const updated = corrective.map(c => c.id === id ? { ...c, ...updates } : c);
    setCorrective(updated);
    DB.set("corrective", updated);
    setEditing(null);

    // Push update to Power Automate
    const tpl = TEMPLATES.find(t => t.id === prev?.template);
    const result = await pushToFlow("update", {
      type: "corrective_action_update",
      action_id: id,
      inspection_id: prev?.inspectionId,
      template_name: tpl?.name || "",
      finding: prev?.finding,
      ...updates,
      updated_at: new Date().toISOString(),
      // Trigger email if status changed to Completed or Verified
      notify_completion: updates.status === "Completed" || updates.status === "Verified",
      // Trigger email if reassigned
      notify_reassign: updates.assigned && updates.assigned !== prev?.assigned,
    });

    if (result.status === SyncStatus.SYNCED) {
      showToast("Action updated & synced");
    } else if (result.status === SyncStatus.PENDING) {

      React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: C.accent, marginBottom: 4, marginTop: 14 }}, "NEW CORRECTIVE ACTION"),
      React.createElement("pre", { style: { background: C.surface, borderRadius: 6, padding: 12, fontSize: 10, color: C.textMuted, overflow: "auto", lineHeight: 1.5, whiteSpace: "pre-wrap", wordBreak: "break-all" }},
        JSON.stringify({
          type: "new_corrective_action", action_id: 201, inspection_id: 101, template_id: "fall-pro",
          template_name: "Fall Protection Equipment", finding: "D-rings showing visible corrosion",
          notes: "Critical - remove from service immediately", priority: "Critical", assigned_to: "Mike Torres",
          location: "Launch Pad A", due_date: "2026-04-16", status: "Open",
          created_at: "2026-04-09T10:30:00.000Z", notify: true
        }, null, 2)
      ),

      React.createElement("div", { style: { fontSize: 11, fontWeight: 700, color: C.accent, marginBottom: 4, marginTop: 14 }}, "ACTION UPDATE"),
      React.createElement("pre", { style: { background: C.surface, borderRadius: 6, padding: 12, fontSize: 10, color: C.textMuted, overflow: "auto", lineHeight: 1.5, whiteSpace: "pre-wrap", wordBreak: "break-all" }},
        JSON.stringify({
          type: "corrective_action_update", action_id: 201, inspection_id: 101,
          template_name: "Fall Protection Equipment", finding: "D-rings showing visible corrosion",
          status: "Completed", assigned: "Mike Torres", priority: "Critical", due: "2026-04-16",
          updated_at: "2026-04-12T14:00:00.000Z", notify_completion: true, notify_reassign: false
        }, null, 2)
      ),
    ),

    // Danger zone
    React.createElement("div", { style: { ...sectionStyle, borderColor: `${C.danger}33` }},
      React.createElement("div", { style: { fontSize: 14, fontWeight: 700, color: C.danger, marginBottom: 10 }}, "Data Management"),
      React.createElement("div", { style: { display: "flex", gap: 10, flexWrap: "wrap" }},
        React.createElement("button", { onClick: () => {
          if (confirm("Export all data as backup before clearing?")) {
            const backup = { inspections: DB.get("inspections", []), corrective: DB.get("corrective", []), exported: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
            const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `ehs-backup-${TODAY}.json`; link.click();
            showToast("Backup downloaded");
          }
        }, style: {
          background: C.surface, color: C.text, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 16px", fontWeight: 600, fontSize: 12, cursor: "pointer", minHeight: 36,
        }}, "Export Backup (JSON)"),
        React.createElement("button", { onClick: () => {
          if (confirm("Clear ALL local inspection data? This cannot be undone. Make sure you have exported first.")) {
            DB.set("inspections", []); DB.set("corrective", []); DB.set("sync_queue", []);
            window.location.reload();
          }
        }, style: {
          background: `${C.danger}22`, color: C.danger, border: `1px solid ${C.danger}44`, borderRadius: 6, padding: "8px 16px", fontWeight: 600, fontSize: 12, cursor: "pointer", minHeight: 36,
        }}, "Clear All Data"),
      ),
    ),
  );
}

/* ── Main App ── */
function App() {
  const [page, setPage] = useState("dashboard");
  const [activeTemplate, setActiveTemplate] = useState(null);
  const [inspections, setInspections] = useState(() => DB.get("inspections", []));
  const [corrective, setCorrective] = useState(() => DB.get("corrective", []));
  const mobile = useIsMobile();
  const [toastEl, showToast] = useToast();

  const nav = [
    { id: "dashboard", label: "Dashboard", icon: "\u25E9" },
    { id: "inspect", label: "Inspect", icon: "\uFF0B" },
    { id: "equipment", label: "Equipment", icon: "\uD83C\uDFF7" },
    { id: "actions", label: "Actions", icon: "\u26A1" },
    { id: "history", label: "History", icon: "\u2630" },
    { id: "export", label: "Export", icon: "\u2B07" },
    { id: "settings", label: "Settings", icon: "\u2699" },
  ];

  const goTo = (p) => { setPage(p); setActiveTemplate(null); };

  // Retry sync queue when app loads and when coming back online
  useEffect(() => {
    processRetryQueue(showToast);
    const onOnline = () => { showToast("Back online \u2014 syncing..."); processRetryQueue(showToast); };
    window.addEventListener("online", onOnline);
    return () => window.removeEventListener("online", onOnline);
  }, []);

  const handleInspectionSubmit = async (inspection, newActions) => {
    const updated = [inspection, ...inspections];
    setInspections(updated);
    DB.set("inspections", updated);

    if (newActions.length > 0) {
      const updatedActions = [...newActions, ...corrective];
      setCorrective(updatedActions);
      DB.set("corrective", updatedActions);
    }

    // Push to Power Automate
    const tpl = TEMPLATES.find(t => t.id === inspection.template);
    const inspPayload = {
      type: "inspection",
      inspection_id: inspection.id,
      template_id: inspection.template,
      template_name: tpl?.name || "",
      regulation: tpl?.reg || "",
      inspector: inspection.inspector,
      site: inspection.site,
      location: inspection.location,
      date: inspection.date,
      weather: inspection.weather,
      total_items: inspection.totalItems,
      findings_count: inspection.findings,
      critical_count: inspection.critical,
      status: inspection.status,
      created_at: inspection.createdAt,
      responses: Object.entries(inspection.responses || {}).map(([id, ans]) => ({
        item_id: id,
        response: ans,
        notes: inspection.notes?.[id] || "",
      })),
    };

    const result = await pushToFlow("inspection", inspPayload);

    // Push each corrective action
    for (const action of newActions) {
      const caPayload = {
        type: "new_corrective_action",
        action_id: action.id,
        inspection_id: action.inspectionId,
        template_id: action.template,
        template_name: tpl?.name || "",
        finding: action.finding,
        notes: action.notes,
        priority: action.priority,
        assigned_to: action.assigned,
        location: action.location,
        due_date: action.due,
        status: action.status,
        created_at: action.createdAt,
        // Power Automate can use priority to decide email notifications
        notify: action.priority === "Critical" || action.priority === "High",
      };
      await pushToFlow("corrective", caPayload);
    }

    if (result.status === SyncStatus.SYNCED) {
      showToast(`Synced \u2014 ${newActions.length} action${newActions.length !== 1 ? "s" : ""} created`);
    } else if (result.status === SyncStatus.PENDING) {
      showToast("Saved offline \u2014 will sync when connected", "info");
    } else if (result.status === SyncStatus.OFFLINE) {
      showToast(`Saved locally \u2014 ${newActions.length} action${newActions.length !== 1 ? "s" : ""} created`);
    } else {
      showToast("Saved locally \u2014 sync failed, will retry", "error");
    }
  };

  return React.createElement("div", { style: { display: "flex", flexDirection: mobile ? "column" : "row", height: "100vh", overflow: "hidden" }},
    toastEl,
    // Desktop sidebar
    !mobile && React.createElement("div", { style: {
      width: 230, background: C.surface, borderRight: `1px solid ${C.border}`,
      padding: "24px 0", display: "flex", flexDirection: "column", flexShrink: 0,
    }},
      React.createElement("div", { style: { padding: "0 22px", marginBottom: 32 }},
        React.createElement("img", { src: RELATIVITY_LOGO, style: { height: 20, marginBottom: 8 } }),
        React.createElement("div", { style: {
          fontSize: 9, color: C.textDim, fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", marginTop: 4,
          background: "linear-gradient(90deg, #FEFFFF 0%, #8A8A96 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
        }}, "EHS INSPECT"),
      ),
      nav.map(item => React.createElement("div", { key: item.id, className: "nav-item", onClick: () => goTo(item.id), style: {
        display: "flex", alignItems: "center", gap: 12, padding: "11px 22px", cursor: "pointer", fontSize: 13, fontWeight: 600,
        color: page === item.id ? C.text : C.textDim,
        background: page === item.id ? `linear-gradient(90deg, ${C.accentDim}, transparent)` : "transparent",
        borderLeft: page === item.id ? `2px solid ${C.accent}` : "2px solid transparent",
      }},
        React.createElement("span", { style: { fontSize: 15, width: 22, textAlign: "center", opacity: page === item.id ? 1 : 0.5 }}, item.icon),
        item.label,
      )),
      React.createElement("div", { style: { flex: 1 }}),
      React.createElement("div", { style: { padding: "14px 22px", borderTop: `1px solid ${C.border}`, margin: "0 12px" }},
        React.createElement("div", { style: { fontSize: 12, color: C.text, fontWeight: 600 }}, DB.get("inspector_name", "Not set")),
        React.createElement("div", { style: { fontSize: 10, color: C.textDim, marginTop: 2 }}, new Date().toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" })),
      ),
    ),
    // Mobile top bar
    mobile && React.createElement("div", { style: {
      background: C.surface, borderBottom: `1px solid ${C.border}`,
      padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0,
    }},
      React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8 }},
        React.createElement("img", { src: RELATIVITY_LOGO, style: { height: 14 } }),
        React.createElement("span", { style: { fontSize: 10, fontWeight: 700, color: C.textMuted, letterSpacing: "0.1em" }}, "EHS"),
      ),
      React.createElement("div", { style: { fontSize: 11, color: C.textDim }}, `${DB.get("inspector_name", "")} \u00B7 ${new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" })}`),
    ),
    // Main content
    React.createElement("div", { style: { flex: 1, padding: mobile ? 16 : 28, overflowY: "auto", paddingBottom: mobile ? 80 : 28, WebkitOverflowScrolling: "touch" }},
      page === "dashboard" && React.createElement(Dashboard, { inspections, corrective, onNavigate: goTo, mobile }),
      page === "inspect" && !activeTemplate && React.createElement(TemplateList, { onSelect: setActiveTemplate, mobile }),
      page === "inspect" && activeTemplate && React.createElement(InspectionForm, { template: activeTemplate, onBack: () => setActiveTemplate(null), onSubmit: handleInspectionSubmit, mobile }),
      page === "equipment" && React.createElement(EquipmentManager, { inspections, mobile, showToast, onInspect: (tagId) => { setActiveTemplate("fall-pro"); setPage("inspect"); DB.set("pending_rfid", tagId); } }),
      page === "actions" && React.createElement(CorrectiveActions, { corrective, setCorrective, mobile, showToast }),
      page === "history" && React.createElement(InspectionHistory, { inspections, mobile, showToast }),
      page === "export" && React.createElement(DataExport, { inspections, corrective, mobile, showToast }),
      page === "settings" && React.createElement(Settings, { mobile, showToast }),
    ),
    // Mobile bottom nav
    mobile && React.createElement("div", { style: {
      position: "fixed", bottom: 0, left: 0, right: 0,
      background: C.surface, borderTop: `1px solid ${C.border}`,
      display: "flex", justifyContent: "space-around", alignItems: "center",
      height: 56, zIndex: 50, paddingBottom: "env(safe-area-inset-bottom, 0px)",
    }},
      nav.map(item => React.createElement("div", { key: item.id, onClick: () => goTo(item.id), style: {
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        gap: 2, cursor: "pointer", flex: 1, height: "100%",
        color: page === item.id ? C.accent : C.textDim, WebkitTapHighlightColor: "transparent",
      }},
        React.createElement("span", { style: { fontSize: 18 }}, item.icon),
        React.createElement("span", { style: { fontSize: 9, fontWeight: 600 }}, item.label),
      )),
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
